name: Enterprise CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build, Test, and Verify (JDBC)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      # الضربة القاضية 1: إجبار Linux MySQL على التسامح مع أحرف الجداول مثل Windows
      - name: Configure Native MySQL (Windows Compatibility)
        run: |
          sudo systemctl stop mysql
          echo -e "[mysqld]\nlower_case_table_names=1" | sudo tee -a /etc/mysql/mysql.conf.d/mysqld.cnf
          sudo systemctl start mysql

      # الضربة القاضية 2: بناء الجداول المطابقة لملف الـ README الخاص بك
      - name: Initialize Database Schema
        run: |
          mysql -u root -proot -e "
          CREATE DATABASE IF NOT EXISTS bank_system;
          USE bank_system;
          CREATE TABLE accounts (
              id VARCHAR(36) PRIMARY KEY,
              owner_name VARCHAR(100) NOT NULL,
              balance BIGINT NOT NULL,
              state VARCHAR(20) NOT NULL,
              version INT NOT NULL DEFAULT 0
          );
          CREATE TABLE transactions (
              id VARCHAR(36) PRIMARY KEY,
              type VARCHAR(20) NOT NULL,
              amount BIGINT NOT NULL,
              timestamp DATETIME NOT NULL,
              status VARCHAR(20) NOT NULL,
              rejection_reason VARCHAR(50),
              from_account_id VARCHAR(36),
              to_account_id VARCHAR(36),
              FOREIGN KEY (from_account_id) REFERENCES accounts(id),
              FOREIGN KEY (to_account_id) REFERENCES accounts(id)
          );"

      # الضربة القاضية 3: توليد ملف .env ديناميكي لإرضاء كود الجافا
      - name: Generate Local .env File
        run: |
          echo "DB_URL=jdbc:mysql://127.0.0.1:3306/bank_system?allowPublicKeyRetrieval=true&useSSL=false" > .env
          echo "DB_USER=root" >> .env
          echo "DB_PASSWORD=root" >> .env

      # تشغيل الاختبارات مع إظهار تفاصيل الخطأ كاملة (e-) في حال فشل أي شيء
      - name: Run Integration Tests
        run: mvn clean test -e