name: Enterprise CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build, Test, and Verify (JDBC)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      # 1. التكتيك الاحترافي: صناعة ملف الجداول وتجهيزه ليتم حقنه في الحاوية
      - name: Prepare Database Schema File
        run: |
          cat << 'EOF' > init.sql
          USE bank_system;
          CREATE TABLE accounts (
              id VARCHAR(36) PRIMARY KEY,
              owner_name VARCHAR(100) NOT NULL,
              balance BIGINT NOT NULL,
              state VARCHAR(20) NOT NULL,
              version INT NOT NULL DEFAULT 0
          );
          CREATE TABLE transactions (
              id VARCHAR(36) PRIMARY KEY,
              type VARCHAR(20) NOT NULL,
              amount BIGINT NOT NULL,
              timestamp DATETIME NOT NULL,
              status VARCHAR(20) NOT NULL,
              rejection_reason VARCHAR(50),
              from_account_id VARCHAR(36),
              to_account_id VARCHAR(36),
              FOREIGN KEY (from_account_id) REFERENCES accounts(id),
              FOREIGN KEY (to_account_id) REFERENCES accounts(id)
          );
          EOF

      # 2. تشغيل الحاوية وإعطاؤها الملف لتبنيه داخلياً بأمان تام مع توافق أحرف الويندوز
      - name: Launch Enterprise MySQL (Native Init)
        run: |
          docker run --name mysql-enterprise \
            -e MYSQL_ROOT_PASSWORD=root \
            -e MYSQL_DATABASE=bank_system \
            -p 3306:3306 \
            -v ${{ github.workspace }}/init.sql:/docker-entrypoint-initdb.d/1-init.sql \
            -d mysql:8.0 \
            --lower_case_table_names=1

          echo "Waiting for Database to strictly initialize..."
          for i in {1..30}; do
            if docker exec mysql-enterprise mysqladmin ping -h 127.0.0.1 -u root -proot --silent; then
              echo "Database is fully awake and ready!"
              sleep 5
              break
            fi
            sleep 3
          done

      # 3. توليد المتغيرات
      - name: Generate Local .env File
        run: |
          echo "DB_URL=jdbc:mysql://127.0.0.1:3306/bank_system?allowPublicKeyRetrieval=true&useSSL=false" > .env
          echo "DB_USER=root" >> .env
          echo "DB_PASSWORD=root" >> .env

      - name: Run Integration Tests
        run: mvn clean test -e