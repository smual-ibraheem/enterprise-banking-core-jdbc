name: Enterprise CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build, Test, and Verify (JDBC)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: bank_system
          MYSQL_ROOT_HOST: "%"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Initialize Database Schema
        env:
          MYSQL_PWD: root
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root bank_system -e "
          CREATE TABLE accounts (
              id VARCHAR(36) PRIMARY KEY,
              owner_name VARCHAR(100) NOT NULL,
              balance BIGINT NOT NULL,
              state VARCHAR(20) NOT NULL,
              version INT NOT NULL DEFAULT 0
          );
          CREATE TABLE transactions (
              id VARCHAR(36) PRIMARY KEY,
              type VARCHAR(20) NOT NULL,
              amount BIGINT NOT NULL,
              timestamp DATETIME NOT NULL,
              status VARCHAR(20) NOT NULL,
              rejection_reason VARCHAR(50),
              from_account_id VARCHAR(36),
              to_account_id VARCHAR(36),
              FOREIGN KEY (from_account_id) REFERENCES accounts(id),
              FOREIGN KEY (to_account_id) REFERENCES accounts(id)
          );"

      # الحل الجذري: توليد ملف .env ديناميكي داخل السيرفر
      - name: Generate Dynamic .env File
        run: |
          echo "DB_URL=jdbc:mysql://127.0.0.1:3306/bank_system?allowPublicKeyRetrieval=true&useSSL=false" > .env
          echo "DB_USER=root" >> .env
          echo "DB_PASSWORD=root" >> .env

      - name: Run Integration Tests
        run: mvn clean test